<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SIDANG! — Pengadilan Anti-Korupsi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --wood: #5c3d1e;
      --wood-light: #8b5e3c;
      --wood-dark: #3b2410;
      --cream: #f7f2e8;
      --cream-dark: #e8dfc8;
      --ink: #1c1a14;
      --red: #b71c1c;
      --gold: #c9a84c;
      --gold-light: #f0c060;
      --green: #1b5e20;
      --blue-dark: #19253d;
      --panel: rgba(28, 26, 20, 0.82);
      --overlay: rgba(8, 6, 4, 0.74);
      --paper-red: #f7e4e1;
      --paper-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      --line: rgba(247, 242, 232, 0.14);
      --danger: #8f1212;
      --muted: #95897a;
      --toast-width: min(320px, calc(100vw - 24px));
      --app-max: 1200px;
      --scene-height: 40vh;
      --button-radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-width: 360px;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(201, 168, 76, 0.1), transparent 28%),
        linear-gradient(180deg, #21140a, #120d08 44%, #0d0906);
      color: var(--cream);
      font-family: "Source Serif 4", serif;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
      color: inherit;
      background: none;
    }

    .app-shell {
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 20%, rgba(201, 168, 76, 0.16), transparent 18%),
        linear-gradient(180deg, rgba(59, 36, 16, 0.9), rgba(18, 12, 8, 0.98));
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 350ms ease both;
    }

    .screen-inner {
      width: min(var(--app-max), 100%);
      max-height: 100%;
    }

    .backdrop-wood {
      background:
        radial-gradient(circle at center, rgba(201, 168, 76, 0.16), transparent 30%),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.025) 0,
          rgba(255, 255, 255, 0.025) 4px,
          transparent 4px,
          transparent 48px
        ),
        linear-gradient(180deg, #4e3117, #27170c 52%, #170f0b);
    }

    .splash-card,
    .howto-card,
    .case-card,
    .transition-card,
    .verdict-card {
      position: relative;
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 32px;
      border: 1px solid rgba(240, 192, 96, 0.2);
      background: linear-gradient(180deg, rgba(36, 25, 16, 0.9), rgba(14, 10, 8, 0.96));
      box-shadow: var(--paper-shadow);
      overflow: hidden;
    }

    .splash-card::before,
    .howto-card::before,
    .case-card::before,
    .transition-card::before,
    .verdict-card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(240, 192, 96, 0.12);
      pointer-events: none;
    }

    .title-kicker,
    .role-badge,
    .ui-tag,
    .small-label {
      font-family: "Courier Prime", monospace;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .splash-card {
      text-align: center;
      padding-top: 44px;
      padding-bottom: 44px;
    }

    .gavel-emblem {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--gold-light);
      background: radial-gradient(circle, rgba(240, 192, 96, 0.16), rgba(0, 0, 0, 0));
      border: 1px solid rgba(240, 192, 96, 0.2);
      font-size: 64px;
      animation: gavelStrike 2.8s ease-in-out infinite;
      transform-origin: 65% 40%;
    }

    .game-logo {
      font-family: "Playfair Display", serif;
      font-size: clamp(3rem, 10vw, 6.5rem);
      line-height: 0.95;
      margin: 0;
      color: var(--cream);
      text-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
    }

    .subtitle {
      margin: 14px auto 8px;
      max-width: 620px;
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      color: rgba(247, 242, 232, 0.88);
    }

    .intro-footnote {
      margin-top: 24px;
      color: rgba(247, 242, 232, 0.58);
      font-size: 0.94rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-top: 28px;
    }

    .primary-btn,
    .secondary-btn,
    .ghost-btn,
    .action-btn,
    .small-icon-btn {
      min-height: 48px;
      padding: 0 20px;
      border-radius: var(--button-radius);
      transition: background 150ms ease, color 150ms ease, transform 150ms ease, border-color 150ms ease;
    }

    .primary-btn {
      color: var(--cream);
      background: linear-gradient(180deg, #c22626, var(--red));
      border: 1px solid rgba(255, 210, 210, 0.24);
      box-shadow: 0 8px 18px rgba(183, 28, 28, 0.24);
    }

    .secondary-btn,
    .ghost-btn {
      border: 1px solid rgba(240, 192, 96, 0.35);
      color: var(--gold-light);
      background: rgba(240, 192, 96, 0.06);
    }

    .primary-btn:hover,
    .secondary-btn:hover,
    .ghost-btn:hover,
    .action-btn:hover,
    .small-icon-btn:hover {
      transform: translateY(-1px);
    }

    .settings-trigger {
      position: absolute;
      top: 22px;
      right: 22px;
      width: 48px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(240, 192, 96, 0.25);
      color: var(--gold-light);
      background: rgba(0, 0, 0, 0.28);
      font-size: 1.3rem;
    }

    .settings-panel,
    .modal-panel,
    .stats-panel {
      width: min(760px, calc(100vw - 24px));
      border: 1px solid rgba(240, 192, 96, 0.24);
      background: linear-gradient(180deg, rgba(28, 21, 14, 0.96), rgba(14, 10, 8, 0.98));
      box-shadow: var(--paper-shadow);
      animation: slideUp 250ms ease both;
    }

    .settings-panel {
      position: absolute;
      top: 78px;
      right: 20px;
      width: min(340px, calc(100vw - 24px));
      padding: 16px;
      z-index: 12;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .setting-row:last-child {
      border-bottom: 0;
    }

    .toggle {
      width: 58px;
      height: 30px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 3px;
      position: relative;
    }

    .toggle::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--cream);
      transition: transform 180ms ease, background 180ms ease;
    }

    .toggle.on {
      background: rgba(27, 94, 32, 0.34);
    }

    .toggle.on::after {
      transform: translateX(28px);
      background: var(--gold-light);
    }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin: 26px 0;
    }

    .step-card,
    .pip-demo,
    .fact-clipping {
      padding: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .step-icon {
      font-size: 1.6rem;
      color: var(--gold-light);
      margin-bottom: 10px;
    }

    .pip-demo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 8px;
    }

    .pip-row {
      display: flex;
      gap: 10px;
    }

    .pip {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(240, 192, 96, 0.5);
      background: rgba(255, 255, 255, 0.05);
      transition: background 400ms ease, border-color 400ms ease, transform 400ms ease;
    }

    .pip.filled {
      background: radial-gradient(circle at 35% 35%, #ffdb86, var(--gold));
      border-color: #f7d77e;
      box-shadow: 0 0 10px rgba(240, 192, 96, 0.28);
    }

    .pip.lost {
      animation: pipLose 400ms ease both;
    }

    .case-layout,
    .transition-layout,
    .verdict-layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 24px;
      align-items: center;
    }

    .portrait-stage {
      min-height: 360px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(201, 168, 76, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(240, 192, 96, 0.12);
      position: relative;
      overflow: hidden;
    }

    .portrait-stage svg {
      width: min(280px, 70%);
      height: auto;
      filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.34));
    }

    .stamp {
      position: absolute;
      right: 20px;
      bottom: 20px;
      padding: 8px 16px;
      border: 3px solid rgba(183, 28, 28, 0.7);
      color: rgba(183, 28, 28, 0.8);
      font-family: "Courier Prime", monospace;
      font-weight: 700;
      font-size: 1.15rem;
      transform: rotate(-14deg);
      opacity: 0.85;
      animation: stampDrop 480ms ease both;
    }

    .fact-clipping {
      margin-top: 18px;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(247, 242, 232, 0.98), rgba(232, 223, 200, 0.96));
      border-left: 5px solid var(--red);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
    }

    .fact-source {
      margin-top: 10px;
      font-size: 0.92rem;
      color: rgba(28, 26, 20, 0.72);
    }

    .courtroom-screen {
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 0;
    }

    .courtroom-shell {
      width: min(var(--app-max), 100%);
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: 48px minmax(220px, var(--scene-height)) minmax(130px, 1fr) 56px;
      background: linear-gradient(180deg, rgba(15, 10, 8, 0.52), rgba(7, 6, 4, 0.7));
    }

    .top-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      border-bottom: 1px solid rgba(240, 192, 96, 0.12);
      background: linear-gradient(180deg, rgba(59, 36, 16, 0.94), rgba(28, 18, 11, 0.95));
    }

    .logo-mini,
    .case-title-mini {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logo-mini {
      font-family: "Playfair Display", serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--gold-light);
    }

    .case-title-mini {
      text-align: center;
      color: rgba(247, 242, 232, 0.9);
      font-size: 0.96rem;
    }

    .bar-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
    }

    .small-icon-btn {
      width: 36px;
      min-height: 36px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid rgba(240, 192, 96, 0.2);
      color: var(--gold-light);
      background: rgba(255, 255, 255, 0.04);
    }

    .court-scene {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(19, 14, 11, 0.96), rgba(28, 18, 11, 0.96) 48%, rgba(14, 10, 8, 0.98)),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.02) 0,
          rgba(255, 255, 255, 0.02) 2px,
          transparent 2px,
          transparent 86px
        );
    }

    .court-scene::before {
      content: "Garuda";
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Playfair Display", serif;
      font-size: 1.1rem;
      color: rgba(240, 192, 96, 0.32);
      letter-spacing: 0;
    }

    .bench,
    .wall-panel,
    .floor-strip {
      position: absolute;
      background: linear-gradient(180deg, var(--wood-light), var(--wood-dark));
      border: 1px solid rgba(0, 0, 0, 0.28);
    }

    .bench {
      top: 22%;
      left: 50%;
      transform: translateX(-50%);
      width: min(240px, 44vw);
      height: 82px;
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.06);
    }

    .wall-panel {
      top: 12%;
      width: 18%;
      height: 42%;
      background: linear-gradient(180deg, rgba(139, 94, 60, 0.34), rgba(59, 36, 16, 0.54));
      border-color: rgba(201, 168, 76, 0.12);
    }

    .wall-panel.left {
      left: 7%;
    }

    .wall-panel.right {
      right: 7%;
    }

    .floor-strip {
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 32%;
      background:
        linear-gradient(180deg, rgba(88, 58, 32, 0.7), rgba(43, 27, 15, 0.96)),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.03) 0,
          rgba(255, 255, 255, 0.03) 2px,
          transparent 2px,
          transparent 52px
        );
    }

    .character {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--cream);
      transform-origin: center bottom;
    }

    .character svg {
      width: 120px;
      height: auto;
    }

    .character.judge {
      top: 6%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    .character.prosecutor {
      left: 8%;
      bottom: 8%;
      z-index: 3;
    }

    .character.defendant {
      right: 8%;
      bottom: 8%;
      z-index: 3;
    }

    .character-name {
      font-family: "Courier Prime", monospace;
      font-size: 0.78rem;
      color: rgba(247, 242, 232, 0.72);
    }

    .speech-bubble {
      position: absolute;
      top: -56px;
      max-width: 220px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(247, 242, 232, 0.96);
      color: var(--ink);
      font-size: 0.88rem;
      line-height: 1.3;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.25);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      left: 22px;
      bottom: -9px;
      border: 10px solid transparent;
      border-top-color: rgba(247, 242, 232, 0.96);
      border-bottom: 0;
    }

    .speech-bubble.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .statement-panel {
      padding: 18px 20px;
      border-top: 1px solid rgba(240, 192, 96, 0.14);
      border-bottom: 1px solid rgba(240, 192, 96, 0.14);
      background:
        linear-gradient(180deg, rgba(17, 13, 10, 0.96), rgba(11, 9, 7, 0.98)),
        radial-gradient(circle at top, rgba(240, 192, 96, 0.08), transparent 28%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
    }

    .speaker-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .speaker-name {
      font-family: "Playfair Display", serif;
      font-size: 1.38rem;
      color: var(--gold-light);
      text-transform: uppercase;
    }

    .role-badge {
      padding: 6px 10px;
      border: 1px solid rgba(240, 192, 96, 0.25);
      color: rgba(247, 242, 232, 0.76);
      font-size: 0.78rem;
    }

    .statement-text {
      min-height: 76px;
      font-size: clamp(1.02rem, 2.4vw, 1.22rem);
      line-height: 1.6;
      color: rgba(247, 242, 232, 0.96);
      white-space: pre-wrap;
    }

    .statement-helper {
      font-size: 0.88rem;
      color: rgba(247, 242, 232, 0.5);
    }

    .action-bar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 0 14px 12px;
      align-items: end;
      background: linear-gradient(180deg, rgba(22, 16, 12, 0.96), rgba(15, 11, 9, 1));
    }

    .action-btn {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: var(--button-radius);
      background: rgba(247, 242, 232, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(247, 242, 232, 0.9);
    }

    .action-btn.active-objection {
      background: linear-gradient(180deg, #c22626, var(--red));
      border-color: rgba(255, 210, 210, 0.2);
      box-shadow: 0 10px 20px rgba(183, 28, 28, 0.24);
    }

    .action-btn:disabled {
      cursor: not-allowed;
      color: rgba(247, 242, 232, 0.34);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: none;
    }

    .button-icon {
      font-size: 1.02rem;
    }

    .court-modal,
    .loading-overlay,
    .flash-overlay,
    .screen-flash,
    .stats-modal {
      position: absolute;
      inset: 0;
    }

    .court-modal,
    .stats-modal {
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--overlay);
      z-index: 30;
    }

    .modal-panel {
      overflow: hidden;
      max-height: min(88vh, 880px);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .doc-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .doc-tab {
      flex: 1 1 33%;
      min-height: 48px;
      padding: 12px;
      border-bottom: 3px solid transparent;
      color: rgba(247, 242, 232, 0.74);
    }

    .doc-tab.active {
      border-bottom-color: var(--red);
      color: var(--cream);
      background: rgba(183, 28, 28, 0.08);
    }

    .doc-body {
      padding: 22px;
      overflow: auto;
      background: linear-gradient(180deg, rgba(247, 242, 232, 0.98), rgba(232, 223, 200, 0.98));
      color: var(--ink);
    }

    .doc-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: start;
      margin-bottom: 20px;
    }

    .doc-title {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: 1.8rem;
    }

    .doc-stamp {
      align-self: start;
      color: rgba(183, 28, 28, 0.74);
      border: 2px solid rgba(183, 28, 28, 0.6);
      padding: 8px 10px;
      transform: rotate(-8deg);
      font-family: "Courier Prime", monospace;
      font-weight: 700;
      animation: stampDrop 480ms ease both;
    }

    .doc-rows {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .doc-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px dashed rgba(28, 26, 20, 0.18);
    }

    .doc-row strong {
      font-weight: 700;
    }

    .anomaly {
      margin: 12px 0;
      padding: 12px 14px;
      background: var(--paper-red);
      border-left: 4px solid var(--red);
      color: #621515;
    }

    .doc-paragraph {
      line-height: 1.72;
      margin: 0 0 12px;
    }

    .modal-footer,
    .stats-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      background: rgba(12, 9, 7, 0.98);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .flash-overlay {
      display: grid;
      place-items: center;
      z-index: 40;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.18);
    }

    .flash-word {
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-size: clamp(4rem, 12vw, 7rem);
      text-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
      animation: objFlash 800ms ease both;
    }

    .flash-word.correct {
      color: var(--gold-light);
    }

    .flash-word.wrong {
      color: #ff6a6a;
    }

    .flash-word.objection {
      color: #ff9a2f;
    }

    .loading-overlay {
      display: grid;
      place-items: center;
      background: rgba(5, 5, 5, 0.82);
      z-index: 35;
    }

    .loading-card {
      text-align: center;
      padding: 32px;
      width: min(460px, calc(100vw - 32px));
      border: 1px solid rgba(240, 192, 96, 0.18);
      background: linear-gradient(180deg, rgba(24, 17, 11, 0.96), rgba(8, 7, 5, 0.98));
    }

    .loading-gavel {
      font-size: 4rem;
      color: var(--gold-light);
      animation: gavelStrike 800ms ease;
    }

    .strike-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 18px 0 12px;
    }

    .strike-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(240, 192, 96, 0.45);
      background: rgba(255, 255, 255, 0.05);
    }

    .strike-dot.active {
      background: var(--gold-light);
      border-color: var(--gold-light);
      box-shadow: 0 0 14px rgba(240, 192, 96, 0.4);
    }

    .screen-flash {
      pointer-events: none;
      z-index: 45;
      animation: screenFlash 260ms ease both;
      background: rgba(255, 255, 255, 0.78);
    }

    .toast-stack {
      position: fixed;
      top: 16px;
      right: 16px;
      width: var(--toast-width);
      display: grid;
      gap: 10px;
      z-index: 60;
    }

    .toast {
      padding: 14px 16px;
      border-left: 4px solid var(--gold);
      background: rgba(14, 11, 9, 0.96);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
      transform: translateX(110%);
      animation: toastIn 280ms ease forwards;
    }

    .toast.info {
      border-left-color: var(--gold);
    }

    .toast.success {
      border-left-color: var(--green);
    }

    .toast.error {
      border-left-color: var(--red);
    }

    .toast-title {
      font-family: "Courier Prime", monospace;
      font-size: 0.8rem;
      color: rgba(247, 242, 232, 0.58);
      margin-bottom: 5px;
    }

    .toast-body {
      color: rgba(247, 242, 232, 0.94);
      line-height: 1.45;
    }

    .verdict-type {
      color: rgba(247, 242, 232, 0.62);
      font-size: 0.88rem;
      margin-bottom: 10px;
    }

    .verdict-title {
      margin: 0 0 16px;
      font-family: "Playfair Display", serif;
      font-size: clamp(2.3rem, 6vw, 4.6rem);
      line-height: 0.98;
    }

    .verdict-title.good {
      color: #ff7777;
    }

    .verdict-title.mid {
      color: var(--gold-light);
    }

    .verdict-title.bad {
      color: rgba(247, 242, 232, 0.6);
    }

    .verdict-flavor {
      font-style: italic;
      color: rgba(247, 242, 232, 0.84);
      line-height: 1.68;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .stat-card {
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .stat-value {
      font-family: "Playfair Display", serif;
      font-size: 1.9rem;
      color: var(--gold-light);
      margin-top: 8px;
    }

    .stats-panel {
      max-height: min(88vh, 880px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .stats-body {
      padding: 20px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: var(--cream);
    }

    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      vertical-align: top;
    }

    .miss-list {
      color: rgba(247, 242, 232, 0.74);
      line-height: 1.45;
    }

    .talking {
      animation: charTalk 500ms steps(2) infinite;
    }

    .shake {
      animation: charShake 420ms ease;
    }

    .nervous {
      animation: charNervous 1.4s linear infinite;
    }

    .confident {
      transform: translateY(-3px) scale(1.02) rotate(-2deg);
    }

    .sweat::after {
      content: "💧";
      position: absolute;
      top: 8px;
      right: 2px;
      font-size: 1rem;
      animation: charSweat 1s ease infinite;
    }

    .muted-text {
      color: rgba(247, 242, 232, 0.62);
    }

    .hidden {
      display: none !important;
    }

    @keyframes gavelStrike {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-12deg); }
      34% { transform: rotate(18deg); }
      46% { transform: rotate(-8deg); }
      62% { transform: rotate(8deg); }
    }

    @keyframes charTalk {
      0% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
      100% { transform: translateY(0); }
    }

    @keyframes charShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    @keyframes charNervous {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(1px, -1px); }
      50% { transform: translate(-1px, 1px); }
      75% { transform: translate(1px, 1px); }
    }

    @keyframes charSweat {
      0% { opacity: 0; transform: translateY(-2px); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translateY(18px); }
    }

    @keyframes objFlash {
      0% { opacity: 0; transform: scale(0.45) rotate(-14deg); }
      20% { opacity: 1; transform: scale(1.12) rotate(4deg); }
      60% { opacity: 1; transform: scale(1) rotate(0deg); }
      100% { opacity: 0; transform: scale(1.06) rotate(-2deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pipLose {
      0% { transform: scale(1); opacity: 1; }
      45% { transform: scale(0.58); opacity: 0.75; }
      100% { transform: scale(0.92); opacity: 0.35; }
    }

    @keyframes screenFlash {
      from { opacity: 0.95; }
      to { opacity: 0; }
    }

    @keyframes stampDrop {
      0% { opacity: 0; transform: scale(2) rotate(-18deg); }
      65% { opacity: 1; transform: scale(0.92) rotate(-7deg); }
      100% { opacity: 0.86; transform: scale(1) rotate(-10deg); }
    }

    @keyframes toastIn {
      to { transform: translateX(0); }
    }

    @media (max-width: 860px) {
      .steps-grid,
      .case-layout,
      .transition-layout,
      .verdict-layout,
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .portrait-stage {
        min-height: 280px;
      }

      .portrait-stage svg {
        width: min(220px, 62%);
      }
    }

    @media (max-width: 680px) {
      .courtroom-shell {
        grid-template-rows: 48px minmax(200px, 36vh) minmax(150px, 1fr) 62px;
      }

      .character svg {
        width: 96px;
      }

      .speech-bubble {
        max-width: 160px;
        font-size: 0.8rem;
      }

      .doc-row {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }

    @media (max-width: 540px) {
      .screen {
        padding: 12px;
      }

      .splash-card,
      .howto-card,
      .case-card,
      .transition-card,
      .verdict-card {
        padding: 24px 18px;
      }

      .top-bar {
        grid-template-columns: auto 1fr auto;
      }

      .case-title-mini {
        font-size: 0.82rem;
      }

      .character.prosecutor {
        left: 3%;
      }

      .character.defendant {
        right: 3%;
      }

      .action-bar {
        gap: 8px;
      }

      .button-label {
        display: none;
      }

      .action-btn {
        padding: 0;
      }

      .court-modal,
      .stats-modal {
        padding: 0;
      }

      .modal-panel,
      .stats-panel {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        max-height: none;
      }
    }
  </style>
</head>

    class AudioManager {
      constructor() {
        this.enabled = true;
        this.failed = false;
        this.ctx = null;
        this.master = null;
        this.ambientNodes = null;
        try {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) throw new Error("NoAudioContext");
          this.ctx = new Ctx();
          this.master = this.ctx.createGain();
          this.master.gain.value = 0.68;
          this.master.connect(this.ctx.destination);
        } catch (_) {
          this.failed = true;
        }
      }

      setEnabled(enabled) {
        this.enabled = enabled;
        if (!enabled) this.stopAmbientCourt();
      }

      resume() {
        if (this.failed || !this.ctx) return Promise.resolve();
        if (this.ctx.state === "suspended") {
          return this.ctx.resume().catch(() => {});
        }
        return Promise.resolve();
      }

      safePlay(fn) {
        if (this.failed || !this.enabled || !this.ctx || !this.master) return;
        this.resume().then(() => {
          try {
            fn();
          } catch (_) {}
        });
      }

      createGain(value = 0.2) {
        const node = this.ctx.createGain();
        node.gain.value = value;
        node.connect(this.master);
        return node;
      }

      createOsc(type, freq, start, duration, gainValue) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.linearRampToValueAtTime(gainValue, start + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain);
        gain.connect(this.master);
        osc.start(start);
        osc.stop(start + duration);
        return { osc, gain };
      }

      createNoiseBuffer(seconds = 1, brown = false) {
        const frameCount = Math.max(1, Math.floor(this.ctx.sampleRate * seconds));
        const buffer = this.ctx.createBuffer(1, frameCount, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        let lastOut = 0;
        for (let i = 0; i < frameCount; i += 1) {
          const white = Math.random() * 2 - 1;
          if (brown) {
            lastOut = (lastOut + (0.02 * white)) / 1.02;
            data[i] = lastOut * 3.5;
          } else {
            data[i] = white;
          }
        }
        return buffer;
      }

      playNoise(duration, filterType, frequency, gainValue) {
        const source = this.ctx.createBufferSource();
        source.buffer = this.createNoiseBuffer(duration);
        const filter = this.ctx.createBiquadFilter();
        filter.type = filterType;
        filter.frequency.value = frequency;
        const gain = this.ctx.createGain();
        const start = this.ctx.currentTime;
        gain.gain.setValueAtTime(gainValue, start);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        source.connect(filter);
        filter.connect(gain);
        gain.connect(this.master);
        source.start(start);
        source.stop(start + duration);
      }

      playGavel() {
        this.safePlay(() => {
          const start = this.ctx.currentTime;
          const hit = this.createOsc("triangle", 100, start, 0.3, 0.25);
          hit.osc.frequency.exponentialRampToValueAtTime(80, start + 0.28);
          this.playNoise(0.12, "lowpass", 680, 0.08);
        });
      }

      playGavelHard() {
        this.safePlay(() => {
          const start = this.ctx.currentTime;
          const low = this.createOsc("triangle", 90, start, 0.5, 0.35);
          low.osc.frequency.exponentialRampToValueAtTime(58, start + 0.46);
          const tail = this.createOsc("sine", 180, start + 0.02, 0.38, 0.12);
          tail.osc.frequency.exponentialRampToValueAtTime(120, start + 0.38);
          this.playNoise(0.18, "bandpass", 500, 0.09);
        });
      }

      playObjection() {
        this.safePlay(() => {
          const start = this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          const delay = this.ctx.createDelay(0.2);
          const feedback = this.ctx.createGain();
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(400, start);
          osc.frequency.exponentialRampToValueAtTime(800, start + 0.6);
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.linearRampToValueAtTime(0.18, start + 0.04);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.6);
          delay.delayTime.value = 0.08;
          feedback.gain.value = 0.22;
          osc.connect(gain);
          gain.connect(this.master);
          gain.connect(delay);
          delay.connect(feedback);
          feedback.connect(delay);
          delay.connect(this.master);
          osc.start(start);
          osc.stop(start + 0.62);
        });
      }

            }
            const gain = this.ctx.createGain();

            osc.type = "square";

            gain.gain.setValueAtTime(0.0001, when);
            gain.gain.linearRampToValueAtTime(0.16, when + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, when + 0.26);
            osc.connect(shaper);
            shaper.connect(gain);
            gain.connect(this.master);
            osc.start(when);
            osc.stop(when + 0.3);
          });

      playVerdictGood() {

          const start = this.ctx.currentTime;
          [196, 262, 330, 392].forEach((base, i) => {
            const when = start + (i * 0.18);
            [1, 2, 3].forEach((mult, idx) => {
              const osc = this.ctx.createOscillator();
              const gain = this.ctx.createGain();
              osc.type = idx === 0 ? "triangle" : "sine";
              osc.frequency.value = base * mult;
              gain.gain.setValueAtTime(0.0001, when);
              gain.gain.linearRampToValueAtTime(0.06 / mult, when + 0.04);
              gain.gain.exponentialRampToValueAtTime(0.0001, when + 1.2);
              osc.connect(gain);

              osc.stop(when + 1.3);
            });
          });
        });
      }

      playVerdictBad() {
        this.safePlay(() => {
          const start = this.ctx.currentTime;
          [220, 174, 130].forEach((note, i) => {
            const when = start + (i * 0.32);
            const osc = this.createOsc("triangle", note, when, 0.9, 0.12);
            osc.osc.frequency.exponentialRampToValueAtTime(note * 0.7, when + 0.8);
          });
        });
      }

      playAmbientCourt() {
        this.safePlay(() => {
          if (this.ambientNodes) return;
          const source = this.ctx.createBufferSource();
          source.buffer = this.createNoiseBuffer(2, true);
          source.loop = true;
          const filter = this.ctx.createBiquadFilter();
          filter.type = "lowpass";
          filter.frequency.value = 320;
          const gain = this.ctx.createGain();
          gain.gain.value = 0.018;
          source.connect(filter);
          filter.connect(gain);
          gain.connect(this.master);
          source.start();
          this.ambientNodes = { source, gain };
        });
      }

      stopAmbientCourt() {
        if (!this.ambientNodes) return;
        try {
          this.ambientNodes.source.stop();
        } catch (_) {}
        this.ambientNodes = null;
      }
    }

    function bindGlobalUI() {
      app.querySelectorAll("[data-action]").forEach((node) => {
        node.addEventListener("click", handleAction);
        node.addEventListener("touchend", handleAction, { passive: true });
      });

      app.querySelectorAll("[data-overlay]").forEach((overlay) => {
        overlay.addEventListener("click", (event) => {
          if (event.target !== overlay) return;
          if (overlay.dataset.overlay === "docs") closeDocumentModal();
          if (overlay.dataset.overlay === "stats") closeStatsModal();
        });
      });
    }

    function handleAction(event) {
      if (event.type === "touchend") {
        if (touchBusy) return;
        touchBusy = true;
        setTimeout(() => { touchBusy = false; }, 250);
      }
      event.preventDefault();
      const action = event.currentTarget.dataset.action;
      if (!action) return;
      audio.resume();
      if (action === "toggle-settings") {
        state.settingsOpen = !state.settingsOpen;
        render();
        return;
      }
      if (action === "toggle-audio") {
        state.audioEnabled = !state.audioEnabled;
        saveSettings();
        render();
        return;
      }
      if (action === "toggle-typewriter") {
        state.typewriterEnabled = !state.typewriterEnabled;
        saveSettings();
        render();
        return;
      }
      if (action === "show-howto") {
        state.currentScreen = "howto";
        render();
        return;
      }
      if (action === "show-case-intro") {
        resetProgress();
        render();
        return;
      }
      if (action === "enter-court") {
        startCourtIntroSequence();
        return;
      }
      if (action === "advance") {
        advanceFlow();
        return;
      }
      if (action === "skip-typewriter") {
        skipTypewriter();
        return;
      }
      if (action === "open-docs") {
        openDocumentModal("view");
        return;
      }
      if (action === "open-bantah") {
        openDocumentModal("bantah");
        return;
      }
      if (action === "close-docs") {
        closeDocumentModal();
        return;
      }
      if (action === "select-doc") {
        state.selectedDocId = event.currentTarget.dataset.docId;
        render();
        return;
      }
      if (action === "use-doc") {
        processBantah();
        return;
      }
      if (action === "press-witness") {
        createToast("info", "Tekan Saksi", UI_TEXT.witnessToast);
        return;
      }
      if (action === "next-case") {
        state.caseIdx += 1;
        state.stmtIdx = 0;
        state.credibility = 3;
        state.currentScreen = "caseIntro";
        render();
        return;
      }
      if (action === "restart") {
        resetProgress();
        render();
        return;
      }
      if (action === "show-stats") {
        state.modalOpen = true;
        render();
        return;
      }
      if (action === "close-stats") {
        closeStatsModal();
      }
    }

    function startCourtIntroSequence() {
      state.currentScreen = "courtroom";
      state.loadingIntro = { strikeCount: 0 };
      state.modalOpen = false;
      render();
      let strike = 0;
      const tick = () => {
        strike += 1;
        state.loadingIntro = { strikeCount: strike };
        audio.playGavel();
        render();
        flashScreen();
        if (strike < LOADING_STRIKES) {
          setTimeout(tick, 480);
        } else {
          setTimeout(() => {
            state.loadingIntro = null;
            state.stmtIdx = 0;
            render();
          }, 520);
        }
      };
      setTimeout(tick, 180);
    }

    function flashScreen() {
      const flash = document.createElement("div");
      flash.className = "screen-flash";
      app.appendChild(flash);
      setTimeout(() => {
        if (flash.parentNode) flash.parentNode.removeChild(flash);
      }, 260);
    }

      audio.setEnabled(state.audioEnabled);

    function getStatementDisplayData() {
      const statement = getCurrentStatement();
      if (state.reactionMode) {
        return {
          speaker: "Hakim Wibowo",
          role: "Ketua Majelis",
          bubbleSpeaker: "judge",
          bubbleText: statement.judgeReaction,
          initialText: state.typewriterEnabled ? state.currentText : statement.judgeReaction
        };
      }
      return {
        speaker: statement.speaker,
        role: statement.role,
        bubbleSpeaker: statement.speakerId === "judge" ? "judge" : statement.speakerId === "raka" ? "raka" : getCurrentCase().defendantId,
        bubbleText: statement.text,
        initialText: state.typewriterEnabled ? state.currentText : statement.text
      };
    }

    function runTypewriterForCurrentStatement() {
      const textEl = document.getElementById("statementText");
      if (!textEl || state.loadingIntro) return;
      const statement = getCurrentStatement();
      const dialogueKey = getDialogueKey();
      const fullText = state.reactionMode ? statement.judgeReaction : statement.text;
      if (state.activeDialogueKey !== dialogueKey) {
        clearInterval(typewriterTimer);
        typewriterTimer = null;
        state.activeDialogueKey = dialogueKey;
        state.currentText = "";
      }
      if (!state.typewriterEnabled) {
        state.isTyping = false;
        state.currentText = fullText;
        textEl.textContent = fullText;
        maybePlayJudgeCue(dialogueKey, statement, fullText);
        return;
      }
      textEl.textContent = state.currentText;
      if (state.currentText === fullText) {
        state.isTyping = false;
        return;
      }
      if (typewriterTimer) return;
      state.isTyping = true;
      let index = state.currentText.length;
      maybePlayJudgeCue(dialogueKey, statement, fullText);
      typewriterTimer = setInterval(() => {
        index += 1;
        state.currentText = fullText.slice(0, index);
        const liveTextEl = document.getElementById("statementText");
        if (liveTextEl) liveTextEl.textContent = state.currentText;
        if (index % 2 === 1) audio.playTypewriterTick();
        if (index >= fullText.length) {
          clearInterval(typewriterTimer);
          typewriterTimer = null;
          state.isTyping = false;
        }
      }, TYPE_SPEED);
    }

    function skipTypewriter() {
      if (!state.isTyping) return;
      const textEl = document.getElementById("statementText");
      const statement = getCurrentStatement();
      const fullText = state.reactionMode ? statement.judgeReaction : statement.text;
      clearInterval(typewriterTimer);
      typewriterTimer = null;
      state.isTyping = false;
      state.currentText = fullText;
      if (textEl) textEl.textContent = fullText;
    }

    function advanceFlow() {
      if (state.loadingIntro) return;
      if (state.isTyping) {
        skipTypewriter();
        return;
      }
      if (state.reactionMode) return;
      const currentCase = getCurrentCase();
      const statement = getCurrentStatement();
      if (statement.objectionable && !getCaseStatementStatus(currentCase.id, statement.id)) {
        addMissedStatement(currentCase.id, statement);
        setCaseStatementStatus(currentCase.id, statement.id, "missed");
        createToast("info", "Peluang Hilang", UI_TEXT.missedToast);
      }
      if (statement.isLast) {
        completeCase();
        return;
      }
      state.stmtIdx += 1;
      render();
    }

    // === DOCUMENT SYSTEM ===
    function openDocumentModal(mode) {
      state.docMode = mode;
      state.selectedDocId = state.selectedDocId || getCurrentCase().documents[0].id;
      state.modalOpen = true;
      audio.playPaperRustle();
      if (mode === "bantah") {
        createToast("info", "Mode Bantah", UI_TEXT.objectionPrompt);
      } else {
        createToast("info", "Dokumen Dibuka", UI_TEXT.docsToast);
      }
      render();
    }

    function closeDocumentModal() {
      state.modalOpen = false;
      state.docMode = "view";
      render();
    }

    // === OBJECTION SYSTEM ===
    function processBantah() {
      const currentCase = getCurrentCase();
      const statement = getCurrentStatement();
      if (!statement.objectionable || !state.selectedDocId) return;
      closeDocumentModal();
      state.flash = { text: UI_TEXT.objection, kind: "objection" };
      audio.playObjection();
      render();
      setTimeout(() => {
        const isCorrect = state.selectedDocId === statement.correctDoc;
        if (isCorrect) {
          resolveCorrectBantah(currentCase, statement);
        } else {
          resolveWrongBantah(currentCase, statement);
        }
      }, 360);
    }

    function resolveCorrectBantah(currentCase, statement) {
      state.correctBantah += 1;
      setCaseStatementStatus(currentCase.id, statement.id, "correct");
      removeMissedIfPresent(currentCase.id, statement.id);
      state.flash = { text: "TEPAT!", kind: "correct" };
      audio.playCorrect();
      audio.playGavelHard();
      createToast("success", "Bantahan Diterima", `${statement.explanation} ${UI_TEXT.correctToast}`);
      render();
      reactionTimer = setTimeout(() => {
        state.flash = null;
        state.reactionMode = true;
        render();
        reactionTimer = setTimeout(() => {
          state.reactionMode = false;
          if (statement.isLast) {
            completeCase();
          } else {
            state.stmtIdx += 1;
            render();
          }
        }, 2500);
      }, 800);
    }

    function resolveWrongBantah(currentCase, statement) {
      state.wrongBantah += 1;
      setCaseStatementStatus(currentCase.id, statement.id, "wrong");
      state.flash = { text: "SALAH!", kind: "wrong" };
      state.credibility = Math.max(0, state.credibility - 1);
      audio.playWrong();
      audio.playPipLose();
      createToast("error", "Bantahan Gagal", UI_TEXT.wrongToast);
      if (state.credibility === 0) {
        createToast("error", "Kredibilitas Habis", UI_TEXT.pipWarning);
      }
      render();
      setTimeout(() => {
        state.flash = null;
        render();
      }, 800);
    }

    function removeMissedIfPresent(caseId, statementId) {
      if (!state.missedStatements[caseId]) return;
      state.missedStatements[caseId] = state.missedStatements[caseId].filter((item) => item.id !== statementId);
    }

    // === CHARACTER ANIMATION ===
    function completeCase() {
      const currentCase = getCurrentCase();
      const currentCorrect = Object.values(state.statementResolved[currentCase.id] || {}).filter((value) => value === "correct").length;
      const currentWrong = Object.values(state.statementResolved[currentCase.id] || {}).filter((value) => value === "wrong").length;
      const missed = state.missedStatements[currentCase.id] || [];
      state.caseResults.push({
        caseId: currentCase.id,
        correct: currentCorrect,
        wrong: currentWrong,
        remainingCredibility: state.credibility,
        missed
      });
      state.modalOpen = false;
      state.selectedDocId = null;
      state.docMode = "view";
      if (state.caseIdx >= state.caseOrder.length - 1) {
        state.timerEndedAt = Date.now();
        state.currentScreen = "verdict";
        render();
        playVerdictSound();
      } else {
        state.currentScreen = "transition";
        render();
      }
    }

    // === VERDICT SYSTEM ===
    function getVerdictData() {
      if (state.correctBantah >= 7) {
        return {
          typeLabel: "Putusan Final Majelis",
          title: "TERBUKTI BERSALAH!",
          cssClass: "good",
          stamp: "VONIS KERAS",
          flavor: "Majelis menilai jaksa berhasil membongkar pola korupsi secara meyakinkan. Kebohongan runtuh satu per satu, dan ruang sidang berpihak pada bukti."
        };
      }
      if (state.correctBantah >= 4) {
        return {
          typeLabel: "Putusan Final Majelis",
          title: "SEBAGIAN TERBUKTI",
          cssClass: "mid",
          stamp: "BUKTI CAMPUR",
          flavor: "Sebagian tuduhan terbukti kuat, namun tidak semua kebohongan berhasil dibongkar. Keadilan bergerak, meski belum sepenuhnya memukul telak."
        };
      }
      return {
        typeLabel: "Putusan Final Majelis",
        title: "TERDAKWA BEBAS",
        cssClass: "bad",
        stamp: "GAGAL BUKTI",
        flavor: "Majelis menilai bantahan jaksa belum cukup tajam untuk meruntuhkan seluruh pembelaan terdakwa. Bukti ada, tetapi momentum persidangan terlepas."
      };
    }

    function getTotalRemainingCredibility() {
      return state.caseResults.reduce((sum, item) => sum + item.remainingCredibility, 0);
    }

    function playVerdictSound() {
      if (state.correctBantah >= 4) {
        audio.playVerdictGood();
      } else {
        audio.playVerdictBad();
      }
    }

    function closeStatsModal() {
      state.modalOpen = false;
      render();
    }

    // === TOAST SYSTEM ===
    function createToast(type, title, body) {
      const toast = {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        type,
        title,
        body
      };
      state.toastsVisible.push(toast);
      renderToasts();
      setTimeout(() => {
        state.toastsVisible = state.toastsVisible.filter((item) => item.id !== toast.id);
        renderToasts();
      }, TOAST_DURATION);
    }

    function renderToasts() {
      toastStack.innerHTML = state.toastsVisible.map((toast) => `
        <article class="toast ${toast.type}">
          <div class="toast-title">${toast.title}</div>
          <div class="toast-body">${toast.body}</div>
        </article>
      `).join("");
    }

    // === INPUT / SHORTCUTS ===
    function onKeyDown(event) {
      if (state.currentScreen !== "courtroom") {
        if (event.key === "Escape" && state.modalOpen) {
          closeStatsModal();
        }
        return;
      }
      if (event.key === "Escape" && state.modalOpen) {
        closeDocumentModal();
        return;
      }
      if (event.key === " " || event.key === "Enter") {
        event.preventDefault();
        if (state.modalOpen) return;
        advanceFlow();
      }
      if ((event.key === "b" || event.key === "B") && !state.modalOpen) {
        const statement = getCurrentStatement();
        const currentCase = getCurrentCase();
        const objectionAvailable = statement.objectionable && !getCaseStatementStatus(currentCase.id, statement.id);
        if (objectionAvailable) openDocumentModal("bantah");
      }
      if ((event.key === "d" || event.key === "D") && !state.modalOpen) {
        openDocumentModal("view");
      }
    }

    // === UTILITIES ===
    function formatDuration(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function getDialogueKey() {
      const currentCase = getCurrentCase();
      const statement = getCurrentStatement();
      return `${currentCase.id}:${statement.id}:${state.reactionMode ? "reaction" : "main"}`;
    }

    function maybePlayJudgeCue(dialogueKey, statement, fullText) {
      if (!(state.reactionMode || statement.speakerId === "judge") || !fullText) return;
      if (state.spokenCueKey === dialogueKey) return;
      state.spokenCueKey = dialogueKey;
      audio.playGavel();
    }

    // === INIT ===
    loadSettings();
    document.addEventListener("keydown", onKeyDown);
    render();
  </script>
</body>
</html>
